// ── GOOGLE SHEETS API (lectura) ───────────────────────────────────────
const SheetsAPI = {
  base: 'https://sheets.googleapis.com/v4/spreadsheets',
  async read(sheetId, tab) {
    if (CONFIG.GOOGLE_API_KEY === 'PEGA_TU_API_KEY_AQUI') return null; // modo demo
    const url = `${this.base}/${sheetId}/values/${encodeURIComponent(tab)}?key=${CONFIG.GOOGLE_API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Sheets API error ${res.status} en ${tab}`);
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
      return obj;
    });
  },
  // Escritura via Verdi Flow webhook
  async write(action, payload) {
    if (CONFIG.VERDI_FLOW_URL.includes('PEGA')) {
      console.warn('Verdi Flow URL no configurada — guardando solo en memoria');
      return { ok: true, demo: true };
    }
    const res = await fetch(CONFIG.VERDI_FLOW_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload }),
    });
    return res.ok ? { ok: true } : { ok: false };
  }
};

// ── GUARDAR PUNCH (llama a Verdi Flow) ───────────────────────────────
async function savePunch(punch, isNew = true) {
  try {
    const result = await SheetsAPI.write(isNew ? 'CREATE_PUNCH' : 'UPDATE_PUNCH', { punch });
    if (!result.demo) toast(isNew ? '✓ Punch guardado en Drive' : '✓ Estado actualizado en Drive');
  } catch (err) {
    toast('Sin conexión · cambio guardado en cola local');
    const queue = JSON.parse(localStorage.getItem('pl_queue') || '[]');
    queue.push({ action: isNew ? 'CREATE_PUNCH' : 'UPDATE_PUNCH', punch, ts: Date.now() });
    localStorage.setItem('pl_queue', JSON.stringify(queue));
  }
}

// ── OFFLINE SYNC (cuando vuelve la red) ──────────────────────────────
window.addEventListener('online', async () => {
  const queue = JSON.parse(localStorage.getItem('pl_queue') || '[]');
  if (!queue.length) return;
  toast(`Reconectado · sincronizando ${queue.length} cambios…`);
  const pending = [...queue];
  localStorage.removeItem('pl_queue');
  for (const item of pending) {
    try { await SheetsAPI.write(item.action, { punch: item.punch }); }
    catch(e) { break; }
  }
  toast('Sincronización completa con Verdi Flow');
});

// ── HELPERS ──────────────────────────────────────────────────────────
function h(strings, ...vals) {
  // Simple tagged template — no escaping; we control all inputs.
  return strings.reduce((acc, s, i) => acc + s + (i < vals.length ? (vals[i] ?? '') : ''), '');
}
function el(html) {
  const div = document.createElement('div');
  div.innerHTML = html.trim();
  return div.firstElementChild;
}
function escape(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function $(id) { return document.getElementById(id); }

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return 'recién';
  if (m < 60) return m + 'm';
  const hr = Math.floor(m / 60);
  if (hr < 24) return hr + 'h';
  return Math.floor(hr / 24) + 'd';
}

function daysOverdue(iso) {
  if (!iso) return null;
  const diff = Math.round((new Date(iso).getTime() - new Date('2026-05-21').getTime()) / 86400000);
  return diff;
}

function toast(message, duration = 2200) {
  const host = $('toasts');
  const t = el(`<div class="toast">${escape(message)}</div>`);
  host.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 200ms ease';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 220);
  }, duration);
}

function generatePhotoBg(seed) {
  const hue = (seed.charCodeAt(0) * 37 + seed.charCodeAt(1) * 13) % 360;

}

// ── PAGE: PHASE / PUNCH LIST ────────────────────────────────────────
function renderPhase() {
  const phase = getPhase(state.scope.phaseId);
  const project = getProject(state.scope.projectId);
  const site = getSite(state.scope.siteId);
  const phasePunches = DATA.punches.filter(p => p.phaseId === phase.id);
  const open = phasePunches.filter(p => !['closed', 'rejected'].includes(p.status));
  const critical = open.filter(p => p.priority === 'high');
  const overdue = open.filter(p => daysOverdue(p.dueDate) < 0);

  const filtered = filterPunches(phasePunches, state.filter);

  return h`
    <header class="appbar">
      <button class="iconbtn" data-action="back">${I.back}</button>
      <div class="ttl">
        <h1>${escape(phase.code)} ${escape(phase.name)}</h1>
        <p class="sub">${escape(site.code)} · ${escape(project.code)}</p>
      </div>
      <span class="sync"><span class="dot"></span>En vivo</span>
      <button class="iconbtn" data-action="export">${I.download}</button>
    </header>
    ${renderScopeStrip()}
    <div class="page">
      <div class="kpi-grid" style="padding-top: 12px;">
        <div class="kpi"><div class="label">Abiertos</div><div class="val">${open.length}</div></div>
        <div class="kpi ${critical.length > 0 ? 'tone-neg' : ''}"><div class="label">Críticos</div><div class="val">${critical.length}</div></div>
        <div class="kpi ${overdue.length > 0 ? 'tone-warn' : ''}"><div class="label">Vencidos</div><div class="val">${overdue.length}</div></div>
        <div class="kpi tone-pos"><div class="label">Progreso</div><div class="val">${phase.progress}%</div></div>
      </div>

      <div style="padding: 4px 12px 8px; display: flex; gap: 6px; overflow-x: auto;">
        ${['all', 'open', 'critical', 'mine'].map(f => h`
          <button class="chip ${state.filter === f ? 'active' : ''}" data-action="filter" data-f="${f}">
            ${f === 'all' ? 'Todos' : f === 'open' ? 'Abiertos' : f === 'critical' ? 'Críticos' : 'Míos'}
            <span style="opacity: 0.7;">${filterCount(phasePunches, f)}</span>
          </button>
        `).join('')}
      </div>

      <div style="background: var(--white);">
        ${filtered.map(p => renderPunchRow(p)).join('')}
      </div>
    </div>
    ${renderBotNav('scope')}
  `;
}

function filterPunches(arr, f) {
  if (f === 'open')     return arr.filter(p => !['closed', 'rejected'].includes(p.status));
  if (f === 'critical') return arr.filter(p => p.priority === 'high' && !['closed', 'rejected'].includes(p.status));
  if (f === 'mine')     return arr.filter(p => p.assigneeId === DATA.user.id || p.mlRespName === DATA.user.name);
  return arr;
}
function filterCount(arr, f) { return filterPunches(arr, f).length; }

function renderPunchRow(p) {
  const over = daysOverdue(p.dueDate);
  const isOverdue = over !== null && over < 0 && !['closed', 'rejected'].includes(p.status);
  return h`
    <div class="punch-row ${isOverdue ? 'overdue-stripe' : ''}" data-action="open-punch" data-id="${p.id}">
      <div class="priority-bar priority-${p.priority}" style="height: auto; min-height: 100%; margin-left: ${isOverdue ? '4px' : '0'};"></div>
      <div class="body">
        <div class="meta-line">
          <span class="code-mono">${escape(p.code)}</span>
          ${p.qualPhase ? `<span class="qual-pill">${escape(p.qualPhase)}</span>` : ''}
          <span class="status-pill status-${p.status}">${escape(STATUS_LABEL[p.status])}</span>
          ${p.priority === 'high' && !['closed', 'rejected'].includes(p.status) ? '<span style="color: var(--neg); display: inline-flex; align-items: center; gap: 2px; font-size: 9px; font-weight: 700;">' + I.flame + ' CRÍT</span>' : ''}
        </div>
        <div class="title">${escape(p.title)}</div>
        <div class="footer">
          ${p.assigneeName ? '<span>' + escape(p.assigneeName) + (p.assigneeOrg ? ' · ' + escape(p.assigneeOrg) : '') + '</span>' : '<span style="color: var(--g50);">Sin asignar</span>'}
          <span>·</span>
          <span>${timeAgo(p.updatedAt)}</span>
          ${p.protoCode ? '<span>·</span><span style="font-family: var(--mono); color: var(--blue); font-size: 10px; border: 1px solid var(--blue); padding: 0 4px; border-radius: 2px;">' + escape(p.protoCode) + '</span>' : ''}
          ${isOverdue ? '<span>·</span><span style="color: var(--neg); font-weight: 700;">Vencido ' + Math.abs(over) + 'd</span>' : ''}
        </div>
      </div>
    </div>
  `;
}

function renderScopeStrip() {
  const codes = getScopeCodes();
  return h`
    <div class="scope-strip">
      <span class="lbl">SCOPE</span>
      <span class="scope-pill">${escape(codes.site)}</span>
      <span class="sep">›</span>
      <span class="scope-pill">${escape(codes.project)}</span>

}

function nextActionCTA(status) {
  switch (status) {
    case 'open':             return { label: 'Asignar y empezar', next: 'assigned' };
    case 'assigned':         return { label: 'Empezar trabajo',   next: 'in_progress' };
    case 'in_progress':      return { label: 'Marcar listo para revisión', next: 'ready_for_review' };
    case 'ready_for_review': return { label: 'Aprobar y cerrar',  next: 'closed' };
    case 'closed':           return { label: 'Reabrir punch',     next: 'open' };
    default:                 return { label: 'Cambiar estado',    next: 'assigned' };
  }
}

// ── BOTTOM NAV ───────────────────────────────────────────────────────
function renderBotNav(active) {
  const tabs = [
    { id: 'map',     label: 'Mapa',     icon: I.map,    route: 'map' },
    { id: 'scope',   label: 'Mi scope', icon: I.layers, route: 'phase' },
    { id: 'new',     label: 'Nuevo',    icon: I.plus,   route: 'create', primary: true },
    { id: 'mine',    label: 'Mis',      icon: I.list,   route: 'inbox' },
    { id: 'account', label: 'Cuenta',   icon: I.user,   route: 'account' }
  ];
  return h`
    <nav class="botnav">
      <ul>
        ${tabs.map(t => h`
          <li>
            <button class="${active === t.id ? 'active' : ''} ${t.primary ? 'primary' : ''}" data-action="nav" data-route="${t.route}">
              ${t.primary ? '<span class="fab">' + t.icon + '</span>' : t.icon}
              <span class="lab">${escape(t.label)}</span>
            </button>
          </li>
        `).join('')}
      </ul>
    </nav>
  `;
}

// ── RENDER DISPATCHER ────────────────────────────────────────────────
function render() {
  const app = $('app');
  if (!state.authed) {
    app.innerHTML = renderLogin();
    bind(app);
    return;
  }
  let body = '';
  switch (state.route) {
    case 'map':     body = renderMap();     break;
    case 'site':    body = renderSite();    break;
    case 'phase':   body = renderPhase();   break;
    case 'detail':  body = renderDetail();  break;
    case 'create':  body = renderCreate();  break;
    case 'inbox':   body = renderInbox();   break;
    case 'account': body = renderAccount(); break;
    default:        body = renderMap();
  }
  app.innerHTML = body;
  bind(app);
}

// ── EVENT BINDING ────────────────────────────────────────────────────
function bind(root) {
  root.querySelectorAll('[data-action]').forEach(elt => {
    elt.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = elt.dataset.action;
      const id = elt.dataset.id;
      const route = elt.dataset.route;
      const next = elt.dataset.next;

      switch (action) {
        case 'login':
          state.authed = true;
          state.route = 'map';
          toast('Bienvenida, ' + DATA.user.name.split(' ')[0]);
          render();
          break;
        case 'logout':
          state.authed = false;
          state.route = 'login';
          render();
          break;
        case 'back':
          history.back();
          // Fallback: navigate based on current route
          if (state.route === 'detail') navigate('phase');
          else if (state.route === 'site') navigate('map');
          else if (state.route === 'phase') navigate('map');
          else if (state.route === 'create') navigate('phase');
          break;
        case 'nav':
          navigate(route);
          break;
        case 'open-site':
          // Update scope to this site's first project + phase
          const site = getSite(id);
          const firstProj = DATA.projects.find(p => p.siteId === id);
          if (firstProj) state.scope.projectId = firstProj.id;
          state.scope.siteId = id;
          const firstPhase = DATA.phases.find(p => p.projectId === state.scope.projectId);
          if (firstPhase) state.scope.phaseId = firstPhase.id;
          navigate('site', { id });
          break;
        case 'open-phase':
          state.scope.projectId = elt.dataset.pid;
          const ph = DATA.phases.find(p => p.projectId === elt.dataset.pid);
          if (ph) state.scope.phaseId = ph.id;
          navigate('phase');
          break;
        case 'open-punch':
          navigate('detail', { id });
          break;
        case 'advance-status':
          const p = DATA.punches.find(x => x.id === id);
          if (p) {
            p.status = next;
            p.updatedAt = new Date().toISOString();
            toast('Estado: ' + STATUS_LABEL[next]);
            savePunch(p, false);
            render();
          }
          break;
        case 'filter':
          state.filter = elt.dataset.f;
          render();
          break;
        case 'add-photo':
          toast('Cámara abierta · función real conecta con Drive');
          break;
        case 'submit-punch':
          // Pull form values
          const title = root.querySelector('#f-title')?.value?.trim();
          if (!title) { toast('El título es requerido'); return; }
          const desc = root.querySelector('#f-desc')?.value?.trim() || '';
          const newP = {
            id: 'p_new_' + Date.now(),
            code: 'P-' + (1050 + DATA.punches.length),
            title, description: desc,
            siteId: state.scope.siteId, projectId: state.scope.projectId, phaseId: state.scope.phaseId,
            status: 'open',
            priority: root.querySelector('[data-toggle="pri"].active')?.dataset.v || 'medium',
            qualPhase: root.querySelector('[data-toggle="qual"].active')?.dataset.v || 'IQ',
            categoryId: root.querySelector('[data-toggle="cat"].active')?.dataset.id || 'cat_elec',
            mlRespName: root.querySelector('#f-ml')?.value || DATA.user.name,
            vendorName: root.querySelector('#f-vendor')?.value || '',
            dueDate: root.querySelector('#f-due')?.value || null,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            photoCount: 1, commentCount: 0
          };
          DATA.punches.unshift(newP);
          await savePunch(newP, true);
          toast('Punch creado: ' + newP.code);
          navigate('detail', { id: newP.id });
          break;
        case 'export':
          toast('Generando reporte… (función real → DOCX/PDF)');
          break;
        case 'toggle':
          // Single-select chip groups
          const group = elt.dataset.toggle;
          const siblings = root.querySelectorAll('[data-toggle="' + group + '"]');
          siblings.forEach(s => s.classList.remove('active'));
          elt.classList.add('active');
          break;
      }
    });
  });

  // Toggle buttons (chips that don't have other actions)
  root.querySelectorAll('[data-toggle]').forEach(elt => {
    if (elt.dataset.action) return;
    elt.addEventListener('click', () => {
      const group = elt.dataset.toggle;
      const siblings = root.querySelectorAll('[data-toggle="' + group + '"]');
      siblings.forEach(s => s.classList.remove('active'));
      elt.classList.add('active');
    });
  });
}

// ── BOOT ─────────────────────────────────────────────────────────────
render();

// PWA hint (no service worker registered; this is standalone)
console.info('Punch List PWA · Google Sheets + Verdi Flow · 2026-06-04');

// ── SERVICE WORKER (cache offline) ───────────────────────────────────
if ('serviceWorker' in navigator) {
  const SW_CODE = `
const CACHE = 'punchlist-v1';
const SHELL = ['./'];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(SHELL)));
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  // Solo cachear GET del mismo origen; pasar requests de Sheets/Verdi sin tocar
  if (e.request.method !== 'GET') return;
  const url = new URL(e.request.url);
  if (url.hostname !== self.location.hostname) return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fresh = fetch(e.request).then(res => {
        if (res.ok) caches.open(CACHE).then(c => c.put(e.request, res.clone()));
        return res;
      });
      return cached || fresh;
    })
  );
});
`;
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl)
    .then(() => console.info('SW registrado · app disponible offline'))
    .catch(e => console.warn('SW no registrado:', e));
}
</script>
